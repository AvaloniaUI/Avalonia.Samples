name: Update dependencies

# ----------------------------------------------------------------------
#  Permissions (explicitly request write access for PR creation)
# ----------------------------------------------------------------------
permissions:
  contents: write          # needed for committing & pushing changes
  pull-requests: write    # needed for the create‑pull‑request action

# ----------------------------------------------------------------------
#  Triggers
# ----------------------------------------------------------------------
on:
  schedule:
    - cron: '0 2 * * *' # Every day at 02:00 UTC
  workflow_dispatch:   # Allows manual runs from the UI

# ----------------------------------------------------------------------
#  Jobs
# ----------------------------------------------------------------------
jobs:
  update-nuget:
    if: github.repository == 'AvaloniaUI/Avalonia.Samples' # Only run this workflow on the main repo (not forks)
    runs-on: windows-latest
    name: Update latest NuGets

    # ------------------------------------------------------------------
    #  Steps
    # ------------------------------------------------------------------
    steps:
      # --------------------------------------------------------------
      #  Checkout the repo (using the default GITHUB_TOKEN)
      # --------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: '0' # Fetch all history for all branches and tags

      # --------------------------------------------------------------
      #  Install .NET SDK 10.x (the latest 10.x version at run time)
      # --------------------------------------------------------------
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # --------------------------------------------------------------
      #  Java (required by Android tooling) + Android SDK
      # --------------------------------------------------------------
      - name: Set up Java (Zulu 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # --------------------------------------------------------------
      #  Restore mobile‑specific workloads (iOS / Android / Wasm)
      # --------------------------------------------------------------
      - name: Restore mobile / wasm workloads
        run: |
          dotnet workload restore ./src/Avalonia.Samples/CompleteApps/AdvancedToDoList/AdvancedToDoList.Android/AdvancedToDoList.Android.csproj
          dotnet workload restore ./src/Avalonia.Samples/CompleteApps/AdvancedToDoList/AdvancedToDoList.Browser/AdvancedToDoList.Browser.csproj
          dotnet workload restore ./src/Avalonia.Samples/CompleteApps/AdvancedToDoList/AdvancedToDoList.iOS/AdvancedToDoList.iOS.csproj
      
      # --------------------------------------------------------------
      #  Install dotnet‑outdated **and put it on PATH**
      # --------------------------------------------------------------
      - name: Install dotnet-outdated tool
        run: |
          dotnet tool install --global dotnet-outdated-tool
          # Add the global‑tool folder to PATH for the remainder of the job
          $toolPath = "$HOME\.dotnet\tools"
          if (Test-Path $toolPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $toolPath
          }
        shell: pwsh

      # --------------------------------------------------------------
      # Run dotnet‑outdated (only real .sln / .slnf / .csproj files)
      # --------------------------------------------------------------
      - name: Run dotnet-outdated (upgrade)
        shell: pwsh
        continue-on-error: true
        run: |
          # Packages that must **not** be upgraded – add or remove as needed
          $exclude = "Xamarin.AndroidX.Core.SplashScreen"

          # Find *only* .sln, .slnf or .csproj files – ignore *.slnx, *.sln.backup, …
          $files = Get-ChildItem -Path "./src/Avalonia.Samples" -Recurse `
                    -Include *.sln,*.slnf,*.csproj,*.fsproj -File |
                    Select-Object -ExpandProperty FullName

          if (-not $files) {
            Write-Host "⚠️ No solution or project files were found – nothing to do."
            exit 0
          }

          foreach ($proj in $files) {
            Write-Host "🔎 Checking $proj"
            # `--no-restore` speeds things up – we already restored workloads above.
            dotnet outdated $proj --upgrade --no-restore --exclude $exclude
          }

      # --------------------------------------------------------------
      #  Detect whether any file changed after the upgrade step
      # --------------------------------------------------------------
      - name: Detect changes
        id: changes
        shell: pwsh
        run: |
          # Run the diff – we only care about the exit code, not the output
          git diff --quiet
          
          # $LASTEXITCODE holds the numeric exit code from the last native command
          if ($LASTEXITCODE -eq 0) {
            # No changes
            Write-Host "✅ No repository changes detected."
            "CHANGES=false" >> $env:GITHUB_OUTPUT
          }
          else {
            # At least one change
            Write-Host "🔄 Changes detected."
            "CHANGES=true" >> $env:GITHUB_OUTPUT
          }
          # Explicitly end with a success code (optional – PowerShell will return 0
          # if the script reaches the end without throwing a terminating error)
          exit 0
          
        - name: Restore after upgrades
          shell: pwsh
          run: |
            # Ensure the solution is in a consistent state after any package upgrades
            dotnet restore ./src/Avalonia.Samples
            
      # --------------------------------------------------------------
      #  Create the report of updated packages (in Markdown) for the PR body
      # --------------------------------------------------------------
      - name: Generate package report
        id: updated-packages
        shell: pwsh
        continue-on-error: true
        run: |
          # Use the runner's temporary directory – it is not part of the repository
          # and will be cleaned up automatically after the job finishes.
          $reportPath = "$env:RUNNER_TEMP\dependency-report.md"
          
          # Run dotnet‑outdated and capture *all* output
          dotnet outdated ./src/Avalonia.Samples  -o $reportPath -of markdown 2>&1

          # If the tool itself failed (e.g., couldn’t find a project) surface the error
          if ($LASTEXITCODE -ne 0) {
              Write-Error "dotnet-outdated exited with code $LASTEXITCODE"
              exit $LASTEXITCODE
          }
          
          # Read the generated markdown file back into a variable so we can pass it to the PR body
          $report = Get-Content -Path $reportPath -Raw
          
          # Use the GitHub Actions multi-line output format
          "list<<EOF" >> $env:GITHUB_OUTPUT
          $report >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          
      # --------------------------------------------------------------
      #  **If** something changed → push a PR
      # --------------------------------------------------------------
      - name: Create Pull Request (only when updates exist)
        if: steps.changes.outputs.CHANGES == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Update NuGet packages"
          title: "chore: Update NuGet packages"
          body: |
            This PR was generated automatically by the **Update dependencies** workflow.
            It contains the latest NuGet package upgrades.
            
            **Packages that were upgraded** (generated by the workflow – replace with the actual list if you prefer):

            <!-- Begin package list -->
            ${{ steps.updated-packages.outputs.list || '*(list auto‑filled by the workflow)*' }}
            <!-- End package list -->
            
            **What to check before merging**

            1. Verify that the solution builds on all target platforms (Desktop, Android, iOS, Browser).  
            2. Run the unit‑test suite (`dotnet test`).  
            3. Ensure no breaking API changes affect the sample app (run the app locally if possible).

          branch: update-nuget-packages
          base: main
          # Optional – keep the PR tidy
          delete-branch: true
          signoff: true
